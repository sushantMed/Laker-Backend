version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: laker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: laker_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - laker_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d laker_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: laker-api
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: postgres
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2

volumes:
  laker_postgres_data:
